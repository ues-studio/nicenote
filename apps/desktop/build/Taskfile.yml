version: '3'

tasks:
  go:mod:tidy:
    summary: 运行 go mod tidy
    internal: true
    cmds:
      - go mod tidy

  install:frontend:deps:
    summary: 安装前端依赖
    dir: frontend
    sources:
      - package.json
      - pnpm-lock.yaml
    generates:
      - node_modules/.modules.yaml
    cmds:
      - pnpm install

  generate:css:
    summary: 从设计 token 生成 CSS 变量
    dir: frontend
    sources:
      - ../../../packages/tokens/src/**/*
      - ../../../packages/tokens/tsconfig.json
      - scripts/generate-css.ts
    generates:
      - src/generated-tokens.css
    cmds:
      - pnpm run generate:css

  generate:bindings:
    label: generate:bindings (BUILD_FLAGS={{.BUILD_FLAGS}})
    summary: 从 Go 代码生成前端 TypeScript bindings
    deps:
      - task: go:mod:tidy
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - frontend/src/bindings/nicenote-desktop/**/*
    cmds:
      - wails3 generate bindings -clean=true -d frontend/src/bindings

  build:frontend:
    label: build:frontend (PRODUCTION={{.PRODUCTION}})
    summary: 构建前端项目
    dir: frontend
    deps:
      - task: install:frontend:deps
      - task: generate:bindings
      - task: generate:css
    cmds:
      - pnpm run build
    env:
      NODE_ENV: '{{if eq .PRODUCTION "true"}}production{{else}}development{{end}}'

  dev:frontend:
    summary: 以开发模式启动前端（Vite 热重载）
    dir: frontend
    deps:
      - task: install:frontend:deps
    cmds:
      - pnpm exec vite --port {{.VITE_PORT}} --strictPort
    env:
      # 确保不使用缓存的 token build
      NODE_ENV: development

  generate:icons:
    summary: 从 appicon.png 生成 Windows .ico 和 Mac .icns 图标
    dir: build
    sources:
      - appicon.png
    generates:
      - darwin/icons.icns
      - windows/icon.ico
    cmds:
      - wails3 generate icons -input appicon.png -macfilename darwin/icons.icns -windowsfilename windows/icon.ico

  ensure:dist:placeholder:
    summary: 确保 frontend/dist/index.html 存在（go:embed 的必要条件）
    dir: frontend
    status:
      - test -f dist/index.html
    cmds:
      - cmd: powershell -Command "New-Item -ItemType Directory -Force -Path dist | Out-Null; Set-Content -Path dist/index.html -Value '<!doctype html><html><head><meta charset=UTF-8></head><body></body></html>'"
        platforms: [windows]
      - cmd: mkdir -p dist && printf '<!doctype html><html><head><meta charset="UTF-8"></head><body></body></html>' > dist/index.html
        platforms: [linux, darwin]

  update:build-assets:
    summary: 更新构建资源
    dir: build
    cmds:
      - wails3 update build-assets -name "{{.APP_NAME}}" -binaryname "{{.APP_NAME}}" -config config.yml -dir .
