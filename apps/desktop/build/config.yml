# NiceNote Desktop — Wails3 构建配置
# 修改 info 或 fileAssociations 后，运行 `wails3 task common:update:build-assets` 更新构建资源

version: '3'

info:
  companyName: "NiceNote"
  productName: "NiceNote"
  productIdentifier: "com.nicenote.desktop"
  description: "Your files are your notes"
  copyright: "(c) 2025, NiceNote"
  comments: "A Markdown note-taking app"
  version: "0.1.0"

# 开发模式配置
dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
      - build/bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: wails3 task common:install:frontend:deps
      type: once
    - cmd: wails3 task common:generate:bindings
      type: once
    - cmd: wails3 task common:generate:css
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: go mod tidy
      type: blocking
    - cmd: wails3 task build:dev:go
      type: blocking
    - cmd: wails3 task run
      type: primary

fileAssociations:
  - ext: md
    name: Markdown
    description: Markdown Note File
    iconName: mdFileIcon
    role: Editor
